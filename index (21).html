<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CUCUMBER CANNON</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;
    font-family:"Arial Black","Arial",sans-serif;touch-action:none;position:fixed;}
  #game{display:block;width:100%;height:100%;touch-action:none;}

  #title{position:fixed;top:env(safe-area-inset-top,8px);left:0;right:0;text-align:center;
    z-index:5;pointer-events:none;font-weight:900;line-height:.9;}
  #title .a{font-size:11vw;color:#ffd200;letter-spacing:1px;
    text-shadow:0 0 0 #d40000, 3px 3px 0 #b00, 5px 6px 0 rgba(0,0,0,.45);
    -webkit-text-stroke:2px #b00000;transform:rotate(-2deg);display:inline-block;}
  #title .b{display:block;font-size:4.6vw;color:#fff;letter-spacing:3px;margin-top:1px;
    text-shadow:2px 2px 0 #b00;}

  .ui{position:fixed;z-index:6;}
  #scoreBox{top:env(safe-area-inset-top,8px);left:10px;font-size:3.4vw;color:#fff;
    text-shadow:1px 1px 0 #000;line-height:1.25;background:rgba(0,0,0,.28);
    padding:6px 9px;border-radius:10px;}
  #scoreBox b{color:#ffd200;}

  #bottom{bottom:calc(env(safe-area-inset-bottom,10px) + 8px);left:0;right:0;
    display:flex;flex-direction:column;align-items:center;gap:8px;z-index:6;padding:0 10px;}
  .row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .btn{font-family:inherit;font-weight:900;font-size:4vw;color:#3a2a00;
    background:linear-gradient(#ffe14d,#ffc400);border:3px solid #fff;border-radius:14px;
    padding:10px 14px;box-shadow:0 4px 0 #a87f00,0 6px 10px rgba(0,0,0,.4);cursor:pointer;}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #a87f00;}
  .btn.red{background:linear-gradient(#ff5a5a,#d40000);color:#fff;box-shadow:0 4px 0 #7a0000,0 6px 10px rgba(0,0,0,.4);}
  .btn.on{background:linear-gradient(#6bff8e,#1bbf4a);color:#06320f;box-shadow:0 4px 0 #0b6e2a,0 6px 10px rgba(0,0,0,.4);}
  .sizewrap{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.3);
    padding:6px 12px;border-radius:14px;}
  .sizewrap label{color:#fff;font-size:3.4vw;font-weight:900;}
  input[type=range]{width:42vw;max-width:240px;accent-color:#3fae4a;height:24px;}

  #splash{position:fixed;inset:0;z-index:20;background:radial-gradient(circle at 50% 35%,#d40000,#7a0000);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;color:#fff;}
  #splash h1{font-size:13vw;color:#ffd200;-webkit-text-stroke:2px #5a0000;line-height:.85;transform:rotate(-3deg);}
  #splash p{font-size:4.2vw;max-width:80%;line-height:1.4;}
  #playBtn{font-size:7vw;padding:16px 34px;}
  .hint{position:fixed;bottom:38%;left:0;right:0;text-align:center;color:#fff;font-size:3.6vw;
    z-index:4;pointer-events:none;text-shadow:1px 1px 2px #000;opacity:.9;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="title"><span class="a">CUCUMBER</span><span class="b">★ CANNON ★</span></div>
<div id="scoreBox" class="ui">YEETS: <b id="yeets">0</b><br>BEST: <b id="best">0</b> ft</div>

<div id="bottom" class="ui">
  <div class="row">
    <button class="btn red" id="resetBtn">↺ STAND HIM BACK UP</button>
  </div>
  <div class="sizewrap">
    <label>SIZE</label>
    <input type="range" id="sizeSlider" min="0.5" max="3.4" step="0.01" value="1.15">
    <button class="btn" id="bigBtn" style="font-size:3.4vw;padding:7px 10px;">MEGA</button>
  </div>
</div>

<div class="hint" id="hint">Swipe the cucumber into him 🥒💥</div>

<div id="splash">
  <h1>CUCUMBER<br>CANNON</h1>
  <p>Grab the giant cucumber and smack him with it. Hit him hard enough and he goes flying. 🥒💥</p>
  <button class="btn" id="playBtn">TAP TO PLAY</button>
</div>

const cv=document.getElementById('game'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1, floorY=0;
let bg=document.createElement('canvas'), bgctx=bg.getContext('2d');

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  floorY=H*0.86;
  renderBg();
  layoutMan();
}
window.addEventListener('resize',resize);

/* ---------------- background: cartoon fast-food joint ---------------- */
function renderBg(){
  bg.width=W*DPR; bg.height=H*DPR; const g=bgctx; g.setTransform(DPR,0,0,DPR,0,0);
  // wall gradient (warm yellow)
  let wall=g.createLinearGradient(0,0,0,floorY);
  wall.addColorStop(0,'#ffe9a8'); wall.addColorStop(1,'#ffd35e');
  g.fillStyle=wall; g.fillRect(0,0,W,floorY);
  // red wainscot band
  g.fillStyle='#d40000'; g.fillRect(0,floorY-H*0.10,W,H*0.10);
  g.fillStyle='#a30000'; g.fillRect(0,floorY-H*0.013,W,H*0.013);
  // golden arches sign
  const cx=W*0.5, ay=H*0.26, aw=W*0.30, ah=H*0.13;
  g.fillStyle='#ffcf00'; g.strokeStyle='#e0a800'; g.lineWidth=3;
  g.beginPath();
  g.moveTo(cx-aw, ay+ah);
  g.bezierCurveTo(cx-aw, ay-ah*0.6, cx-aw*0.18, ay-ah*0.6, cx-aw*0.05, ay+ah*0.45);
  g.bezierCurveTo(cx, ay+ah*0.05, cx, ay+ah*0.05, cx+aw*0.05, ay+ah*0.45);
  g.bezierCurveTo(cx+aw*0.18, ay-ah*0.6, cx+aw, ay-ah*0.6, cx+aw, ay+ah);
  g.lineTo(cx+aw*0.62, ay+ah);
  g.bezierCurveTo(cx+aw*0.62, ay-ah*0.05, cx+aw*0.30, ay-ah*0.05, cx+aw*0.20, ay+ah*0.55);
  g.lineTo(cx-aw*0.20, ay+ah*0.55);
  g.bezierCurveTo(cx-aw*0.30, ay-ah*0.05, cx-aw*0.62, ay-ah*0.05, cx-aw*0.62, ay+ah);
  g.closePath(); g.fill(); g.stroke();
  // menu boards
  g.fillStyle='#222'; 
  roundRectP(g, W*0.06, H*0.10, W*0.20, H*0.12, 8); g.fill();
  roundRectP(g, W*0.74, H*0.10, W*0.20, H*0.12, 8); g.fill();
  g.fillStyle='#ffd200';
  for(let s of [0.06,0.74]) for(let i=0;i<4;i++){ g.fillRect(W*(s+0.02), H*(0.125+i*0.022), W*0.16, H*0.011);}
  // counter
  g.fillStyle='#c9c2b0'; g.fillRect(0,floorY-H*0.045,W,H*0.045);
  g.fillStyle='#8f877a'; g.fillRect(0,floorY-H*0.045,W,H*0.008);
  // floor tiles (perspective-ish)
  let fl=g.createLinearGradient(0,floorY,0,H); fl.addColorStop(0,'#d9d2c4'); fl.addColorStop(1,'#b7ad9a');
  g.fillStyle=fl; g.fillRect(0,floorY,W,H-floorY);
  g.strokeStyle='rgba(120,110,95,.45)'; g.lineWidth=2;
  for(let i=-8;i<=8;i++){ g.beginPath(); g.moveTo(cx+i*W*0.06, floorY); g.lineTo(cx+i*W*0.22, H); g.stroke(); }
  for(let j=1;j<7;j++){ let yy=floorY+(H-floorY)*(j/7)*(j/7); g.beginPath(); g.moveTo(0,yy); g.lineTo(W,yy); g.stroke(); }
  // vignette
  let vg=g.createRadialGradient(cx,H*0.42,H*0.2,cx,H*0.42,H*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.28)');
  g.fillStyle=vg; g.fillRect(0,0,W,H);
}
function roundRectP(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}

/* ---------------- the dude ---------------- */
const dude=new Image(); let dudeReady=false;
dude.onload=()=>{dudeReady=true; layoutMan();};
dude.src=DUDE_SRC;

const man={x:0,y:0,w:0,h:0,vx:0,vy:0,ang:0,va:0,sx:1,sy:1,state:'idle',restT:0,hitFlash:0,bob:0};
function layoutMan(){
  if(!dudeReady){return;}
  man.h=H*0.5; man.w=man.h*(dude.naturalWidth/dude.naturalHeight);
  man.homeX=W*0.5; man.homeY=floorY-man.h*0.5;
  if(man.state==='idle'){man.x=man.homeX; man.y=man.homeY;}
}
function standUp(){
  man.state='settling'; man.vx=0;man.vy=0;man.va=0;
}

/* ---------------- cucumber ---------------- */
let sizeScale=1.15;
const cuke={x:0,y:0,px:0,py:0,vx:0,vy:0,ang:0,bend:0,wob:0,held:false,proj:false};
function cukeLen(){return (H*0.16)*sizeScale;}
function cukeRad(){return (H*0.030)*sizeScale;}

function drawCucumber(g,x,y,ang,len,rad,bend,wob){
  const ax=Math.cos(ang),ay=Math.sin(ang), px=-Math.sin(ang),py=Math.cos(ang);
  const N=26, top=[],bot=[];
  for(let i=0;i<=N;i++){
    const t=i/N;
    const s=(t-0.5)*len;
    const off=bend*Math.sin(t*Math.PI) + Math.sin(t*7+wob)*rad*0.16;
    const r=rad*Math.pow(Math.sin(Math.PI*t),0.55)*(1+0.06*Math.sin(t*5+wob));
    const bx=x+ax*s+px*off, by=y+ay*s+py*off;
    top.push([bx+px*r, by+py*r]); bot.push([bx-px*r, by-py*r]);
  }
  g.beginPath(); g.moveTo(top[0][0],top[0][1]);
  for(const p of top) g.lineTo(p[0],p[1]);
  for(let i=bot.length-1;i>=0;i--) g.lineTo(bot[i][0],bot[i][1]);
  g.closePath();
  const grad=g.createLinearGradient(x+px*rad,y+py*rad,x-px*rad,y-py*rad);
  grad.addColorStop(0,'#2f6b22'); grad.addColorStop(.45,'#5cae3d'); grad.addColorStop(.7,'#79c94f'); grad.addColorStop(1,'#357328');
  g.fillStyle=grad; g.fill();
  g.lineWidth=Math.max(2,rad*0.16); g.strokeStyle='#274d18'; g.stroke();
  // highlight
  g.save(); g.clip();
  g.strokeStyle='rgba(220,255,190,.55)'; g.lineWidth=rad*0.4;
  g.beginPath();
  for(let i=0;i<top.length;i++){const p=top[i]; const q=[p[0]-px*rad*0.55,p[1]-py*rad*0.55]; if(i===0)g.moveTo(q[0],q[1]); else g.lineTo(q[0],q[1]);}
  g.stroke();
  // bumps
  g.fillStyle='rgba(40,80,25,.6)';
  for(let i=2;i<N-1;i+=3){const t=i/N;const s=(t-0.5)*len;const off=bend*Math.sin(t*Math.PI);const bx=x+ax*s+px*off,by=y+ay*s+py*off;const rr=rad*0.12;g.beginPath();g.arc(bx+px*rad*0.2,by+py*rad*0.2,rr,0,7);g.fill();}
  g.restore();
  // blossom nub
  const e=[x+ax*(len/2),y+ay*(len/2)];
  g.fillStyle='#cfe8b0'; g.beginPath(); g.arc(e[0],e[1],rad*0.32,0,7); g.fill();
}

let parts=[],texts=[],shake=0;
function burst(x,y,n,colors){for(let i=0;i<n;i++){const a=Math.random()*7,sp=2+Math.random()*8;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,size:4+Math.random()*9,col:colors[(Math.random()*colors.length)|0],rot:Math.random()*7,vr:(Math.random()-.5)*.6});}}
function popText(x,y,txt,col){texts.push({x,y,vy:-2.4,life:1,txt,col,scale:0.3});}

/* ---------------- audio ---------------- */
let AC=null;
function unlockAudio(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function slapSfx(power){if(!AC)return;const t=AC.currentTime;const b=AC.createBuffer(1,2200,AC.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const s=AC.createBufferSource();s.buffer=b;const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=900+power*400;const g=AC.createGain();g.gain.value=0.5;s.connect(f);f.connect(g);g.connect(AC.destination);s.start(t);}
function boingSfx(power){if(!AC)return;const t=AC.currentTime;const o=AC.createOscillator();const g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(140+power*120,t);o.frequency.exponentialRampToValueAtTime(520+power*300,t+0.18);g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.42);}

/* ---------------- score ---------------- */
let yeets=0,best=0;
const yeetsEl=document.getElementById('yeets'),bestEl=document.getElementById('best');

/* ---------------- input (drag & smack only) ---------------- */
const hint=document.getElementById('hint');
document.getElementById('resetBtn').onclick=()=>{standUp();};
document.getElementById('sizeSlider').oninput=e=>{sizeScale=+e.target.value;};
document.getElementById('bigBtn').onclick=()=>{sizeScale=sizeScale>2.4?1.15:3.0;document.getElementById('sizeSlider').value=sizeScale;};

function pos(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
function down(e){
  unlockAudio();
  if(!started)return;
  const p=pos(e);
  cuke.held=true; cuke.x=p.x; cuke.y=p.y; cuke.px=p.x; cuke.py=p.y;
}
function move(e){
  if(!started)return; const p=pos(e);
  if(cuke.held){ cuke.x=p.x; cuke.y=p.y; }
  if(e.cancelable)e.preventDefault();
}
function up(e){ cuke.held=false; }
cv.addEventListener('mousedown',down); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
cv.addEventListener('touchstart',down,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',up);

/* ---------------- impact ---------------- */
let cooldown=0;
function tryHit(tipx,tipy,speed){
  if(cooldown>0)return;
  const dx=tipx-man.x, dy=tipy-man.y;
  // man local: rotate by -ang
  const ca=Math.cos(-man.ang),sa=Math.sin(-man.ang);
  const lx=dx*ca-dy*sa, ly=dx*sa+dy*ca;
  if(Math.abs(lx)>man.w*0.55 || Math.abs(ly)>man.h*0.55) return;
  const power=Math.min(1.6, speed/26 + sizeScale*0.18);
  const dirx=(dx)||0.001, diry=(dy)||0;
  const dlen=Math.hypot(dirx,diry)||1;
  const upper = ly < -man.h*0.12;
  cooldown=0.22;
  shake=Math.min(26,10+power*16);
  man.hitFlash=1;
  // squash
  man.sx=1.35; man.sy=0.7;
  if(upper){
    // SLAP: knock sideways + spin
    man.vx += (dirx/dlen)*(14+power*22);
    man.vy -= 8+power*12;
    man.va += (cuke.vx>=0?1:-1)*(0.18+power*0.25);
    slapSfx(power);
    popText(man.x,man.y-man.h*0.3, pick(['SLAP!','BONK!','SMACK!','OOF!']), '#fff');
    burst(tipx,tipy,18,['#ffe14d','#fff','#ff7','#5cae3d']);
  } else {
    // LAUNCH (yeet up)
    man.vy -= 26+power*26;
    man.vx += (dirx/dlen)*(6+power*10);
    man.va += (Math.random()-.5)*0.5+0.3;
    boingSfx(power);
    popText(man.x,man.y, pick(['YEEET!','LAUNCH!','TO SPACE!','BLAST OFF!','🚀']), '#ffd200');
    burst(tipx,tipy,26,['#5cae3d','#79c94f','#fff','#ffe14d']);
  }
  man.state='flying'; man.restT=0;
  yeets++; yeetsEl.textContent=yeets;
}
function pick(a){return a[(Math.random()*a.length)|0];}

/* ---------------- loop ---------------- */
let started=false, last=performance.now();
function loop(now){
  const dt=Math.min(0.033,(now-last)/1000); last=now;
  update(dt); draw();
  requestAnimationFrame(loop);
}
function update(dt){
  if(cooldown>0)cooldown-=dt;
  man.bob+=dt;
  // cucumber velocity & orientation
  cuke.wob+=dt*10;
  {
    cuke.vx=(cuke.x-cuke.px); cuke.vy=(cuke.y-cuke.py);
    cuke.px=cuke.x; cuke.py=cuke.y;
    const sp=Math.hypot(cuke.vx,cuke.vy);
    if(sp>1.5) cuke.ang=Math.atan2(cuke.vy,cuke.vx);
    cuke.bend = clamp((cuke.held? sp*0.9:0)*0.6, -cukeRad()*2.6, cukeRad()*2.6);
    cuke.bend *= (cuke.vx>=0?1:-1);
    if(!cuke.held){ // idle float near a corner
      const tx=W*0.84, ty=H*0.5;
      cuke.x+=(tx-cuke.x)*0.06; cuke.y+=(ty-cuke.y)*0.06+Math.sin(cuke.wob*0.5)*0.6;
      cuke.ang=Math.atan2(Math.sin(cuke.wob*0.5),0.2)-Math.PI/2;
      cuke.bend=Math.sin(cuke.wob*0.7)*cukeRad()*0.8;
    }
    // hit test with tip
    if(cuke.held && sp>6){
      const tip=cukeTip();
      tryHit(tip[0],tip[1],sp);
    }
  }
  // man physics
  if(man.state==='flying'){
    man.vy+=1.15;            // gravity
    man.vx*=0.995; 
    man.x+=man.vx; man.y+=man.vy; man.ang+=man.va; man.va*=0.992;
    // best height
    const ht=Math.max(0,(floorY-man.h*0.5 - man.y));
    const ft=Math.round(ht/H*180);
    if(ft>best){best=ft;bestEl.textContent=best;}
    // walls
    if(man.x<man.w*0.3){man.x=man.w*0.3;man.vx=Math.abs(man.vx)*0.6;man.va*=-0.5;shake=Math.max(shake,8);}
    if(man.x>W-man.w*0.3){man.x=W-man.w*0.3;man.vx=-Math.abs(man.vx)*0.6;man.va*=-0.5;shake=Math.max(shake,8);}
    // floor
    const restY=floorY-man.h*0.5;
    if(man.y>restY){
      man.y=restY;
      if(Math.abs(man.vy)>4){ man.vy=-man.vy*0.45; man.vx*=0.7; man.va*=0.5; man.sx=1.3;man.sy=0.75; shake=Math.max(shake,7); slapSfx(0.3);}
      else { man.vy=0; man.restT+=dt; man.vx*=0.8; }
    }
    if(man.restT>0.9){ man.state='settling'; }
  } else if(man.state==='settling'){
    man.x+=(man.homeX-man.x)*0.18;
    man.y+=(man.homeY-man.y)*0.18;
    man.ang+=(0-man.ang)*0.2;
    man.vx=man.vy=man.va=0;
    if(Math.abs(man.x-man.homeX)<1&&Math.abs(man.ang)<0.01){man.state='idle';man.x=man.homeX;man.y=man.homeY;man.ang=0;}
  } else { // idle
    man.y=man.homeY+Math.sin(man.bob*2)*2;
  }
  // squash spring back
  man.sx+=(1-man.sx)*0.18; man.sy+=(1-man.sy)*0.18;
  if(man.hitFlash>0)man.hitFlash-=dt*3;
  // particles
  for(const p of parts){p.vy+=0.4;p.x+=p.vx;p.y+=p.vy;p.vx*=0.99;p.life-=dt*1.3;p.rot+=p.vr;}
  parts=parts.filter(p=>p.life>0);
  for(const t of texts){t.y+=t.vy;t.vy*=0.96;t.life-=dt*1.1;t.scale+=(1-t.scale)*0.25;}
  texts=texts.filter(t=>t.life>0);
  if(shake>0)shake*=0.86;
}
function cukeTip(){const l=cukeLen()/2;return [cuke.x+Math.cos(cuke.ang)*l, cuke.y+Math.sin(cuke.ang)*l];}
function clamp(v,a,b){return v<a?a:v>b?b:v;}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>1){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);}
  ctx.drawImage(bg,0,0,W,H);

  // man
  if(dudeReady){
    ctx.save();
    ctx.translate(man.x,man.y); ctx.rotate(man.ang); ctx.scale(man.sx,man.sy);
    if(man.hitFlash>0){ctx.shadowColor='rgba(255,80,80,'+man.hitFlash+')';ctx.shadowBlur=40;}
    ctx.drawImage(dude,-man.w/2,-man.h/2,man.w,man.h);
    ctx.restore();
    // motion lines when fast
    if(man.state==='flying'&&Math.hypot(man.vx,man.vy)>14){
      ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=3;
      for(let i=0;i<4;i++){ctx.beginPath();const ox=-man.vx*(i+1)*0.8,oy=-man.vy*(i+1)*0.8;ctx.moveTo(man.x+ox-8,man.y+oy);ctx.lineTo(man.x+ox+8,man.y+oy);ctx.stroke();}
    }
  }

  // cucumber
  drawCucumber(ctx,cuke.x,cuke.y,cuke.ang,cukeLen(),cukeRad(),cuke.bend,cuke.wob);

  // particles
  for(const p of parts){ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.7);ctx.restore();}
  // texts
  for(const t of texts){ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,t.life*1.3));ctx.translate(t.x,t.y);ctx.scale(t.scale,t.scale);ctx.font='900 46px Arial Black,sans-serif';ctx.textAlign='center';ctx.lineWidth=8;ctx.strokeStyle='#5a0000';ctx.strokeText(t.txt,0,0);ctx.fillStyle=t.col;ctx.fillText(t.txt,0,0);ctx.restore();}

  ctx.restore();
}

/* ---------------- start ---------------- */
document.getElementById('playBtn').onclick=()=>{
  unlockAudio();
  document.getElementById('splash').style.display='none';
  started=true; resize();
  cuke.x=W*0.78;cuke.y=H*0.5;cuke.px=cuke.x;cuke.py=cuke.y;
  setTimeout(()=>hint.style.opacity=0,2800);
};
resize();
requestAnimationFrame(loop);
</script>
</body>
